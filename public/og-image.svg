<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#022c22"/>
      <stop offset="50%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="300" fill="rgba(16,185,129,0.08)"/>
  <circle cx="1000" cy="500" r="250" fill="rgba(20,184,166,0.06)"/>
  
  <!-- Logo -->
  <rect x="80" y="60" width="56" height="56" rx="14" fill="#10b981"/>
  <path d="M95 80 L108 80 M101.5 74 L101.5 86 M92 92 L111 92 M92 92 L92 100 L111 100 L111 92" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(-5, -5) scale(0.8)"/>
  
  <!-- Title -->
  <text x="160" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white">CivicSentry AI</text>
  
  <!-- Main heading -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Know Before</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">You Go Vote</text>
  
  <!-- Description -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">Real-time election safety intelligence for</text>
  <text x="80" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">33,802 polling units across Nigeria</text>
  
  <!-- Stats -->
  <rect x="80" y="470" width="180" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)"/>
  <text x="170" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">33,802</text>
  <text x="170" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Polling Units</text>
  
  <rect x="290" y="470" width="140" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)"/>
  <text x="360" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">6</text>
  <text x="360" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">States</text>
  
  <rect x="450" y="470" width="140" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)"/>
  <text x="520" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">26</text>
  <text x="520" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Data Sources</text>
  
  <!-- Map dots decoration -->
  <circle cx="850" cy="200" r="8" fill="#ef4444" opacity="0.8"/>
  <circle cx="920" cy="250" r="6" fill="#f97316" opacity="0.8"/>
  <circle cx="780" cy="300" r="10" fill="#22c55e" opacity="0.8"/>
  <circle cx="880" cy="350" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="950" cy="180" r="5" fill="#22c55e" opacity="0.8"/>
  <circle cx="1020" cy="280" r="9" fill="#f97316" opacity="0.8"/>
  <circle cx="800" cy="400" r="6" fill="#22c55e" opacity="0.8"/>
  <circle cx="900" cy="420" r="8" fill="#ef4444" opacity="0.8"/>
  <circle cx="1050" cy="350" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="980" cy="450" r="5" fill="#f97316" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="850" y1="200" x2="920" y2="250" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="920" y1="250" x2="780" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="780" y1="300" x2="880" y2="350" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="880" y1="350" x2="1020" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="end">civicsentry.ai</text>
</svg>
